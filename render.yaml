services:
  - type: web
    name: mabaso-ai-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false
      - key: APPLE_REDIRECT_URI
        sync: false
      - key: APP_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADMIN_LOGIN_MAX_ATTEMPTS
        value: "3"
      - key: ADMIN_LOGIN_LOCKOUT_MINUTES
        value: "15"
      - key: SESSION_TTL_MINUTES
        value: "90"
      - key: SESSION_REFRESH_WINDOW_MINUTES
        value: "20"
      - key: MAX_HISTORY_ITEMS
        value: "24"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_TIMEOUT_SECONDS
        value: "20"
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        value: "mabasoasakhe@gmail.com"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: MAIL_USE_TLS
        sync: false
      - key: MAIL_USE_SSL
        sync: false
      - key: YOUTUBE_COOKIES_TXT
        sync: false
      - key: YOUTUBE_COOKIES_FILE
        sync: false
      - key: YOUTUBE_PROXY_HTTP_URL
        sync: false
      - key: YOUTUBE_PROXY_HTTPS_URL
        sync: false
      - key: YOUTUBE_WEBSHARE_PROXY_USERNAME
        sync: false
      - key: YOUTUBE_WEBSHARE_PROXY_PASSWORD
        sync: false
      - key: YOUTUBE_WEBSHARE_PROXY_HOST
        value: "p.webshare.io"
      - key: YOUTUBE_WEBSHARE_PROXY_PORT
        value: "80"
      - key: YOUTUBE_WEBSHARE_PROXY_LOCATIONS
        sync: false
      - key: YTDLP_IMPERSONATE_TARGET
        sync: false

  - type: web
    name: mabaso-ai-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Robots-Tag
        value: all
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=300
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=300
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: mabaso-ai-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_APPLE_CLIENT_ID
        sync: false
      - key: VITE_APPLE_REDIRECT_URI
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
