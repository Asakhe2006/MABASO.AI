name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health endpoint
        run: curl --fail --silent --show-error --location --connect-timeout 15 --max-time 60 --retry 5 --retry-delay 5 --retry-all-errors https://mabaso-ai-api.onrender.com/health > /dev/null

      - name: Warm frontend shell
        run: curl --silent --show-error --location --connect-timeout 15 --max-time 60 --retry 3 --retry-delay 5 https://mabaso-ai-web.onrender.com/ > /dev/null || true
