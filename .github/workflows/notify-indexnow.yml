name: Notify IndexNow

on:
  push:
    branches:
      - main
    paths:
      - "frontend/index.html"
      - "frontend/public/**"
      - "frontend/src/**"
      - ".github/workflows/notify-indexnow.yml"
  workflow_dispatch:

concurrency:
  group: notify-indexnow
  cancel-in-progress: true

jobs:
  submit-homepage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Wait for frontend deployment
        run: sleep 360

      - name: Submit homepage to IndexNow
        env:
          INDEXNOW_KEY: 12c82582dc6773b82b6032a2326423c9
          INDEXNOW_HOST: mabaso-ai-web.onrender.com
          INDEXNOW_URL: https://mabaso-ai-web.onrender.com/
          INDEXNOW_KEY_LOCATION: https://mabaso-ai-web.onrender.com/12c82582dc6773b82b6032a2326423c9.txt
        run: |
          payload=$(cat <<EOF
          {
            "host": "${INDEXNOW_HOST}",
            "key": "${INDEXNOW_KEY}",
            "keyLocation": "${INDEXNOW_KEY_LOCATION}",
            "urlList": [
              "${INDEXNOW_URL}"
            ]
          }
          EOF
          )

          for attempt in 1 2 3; do
            curl --fail --silent --show-error \
              --request POST "https://api.indexnow.org/indexnow" \
              --header "Content-Type: application/json; charset=utf-8" \
              --data "${payload}" && exit 0
            echo "IndexNow submission attempt ${attempt} failed. Waiting before retrying..."
            sleep 180
          done

          echo "IndexNow submission failed after retries."
          exit 1
